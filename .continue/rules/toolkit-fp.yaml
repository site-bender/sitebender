name: sitebender/toolkit-fp
version: 1.0.0
schema: v1

rules:
  - name: Toolkit-Centric FP
    rule: |
      - No external FP or validation libraries (e.g., fp-ts, zod). Use the toolkit exclusively.
      - Prefer toolkit `vanilla`/`lifted` functions where provided.
      - Use toolkit monads for effects and errors (Result, Validation, Maybe, Task, etc.)—no thrown exceptions.
      - Prefer named function declarations over curried arrow functions.
      - Enforce immutability, single responsibility, and composition over complexity.
