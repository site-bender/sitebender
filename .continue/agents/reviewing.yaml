name: DeepSeek — Reviewing
version: 1.0.0
schema: v1

models:
  - name: DeepSeek Coder 33B (Ollama)
    provider: ollama
    model: deepseek-coder:33b
    apiBase: http://localhost:11434
    roles:
      - chat
      - edit
    defaultCompletionOptions:
      temperature: 0.1

context:
  - provider: code
  - provider: diff
  - provider: folder
    params:
      path: ./rules
      include:
        - "**/*.md"
        - "**/*.json"
      maxBytes: 100000
  - provider: terminal

rules:
  - uses: sitebender/core-philosophy
  - uses: sitebender/code-style
  - uses: sitebender/imports
  - uses: sitebender/toolkit-fp
  - uses: sitebender/envoy-style
  - uses: sitebender/git-discipline
  - uses: sitebender/no-web-components
  - uses: sitebender/architecture
  - uses: sitebender/assistant-compliance
  - uses: sitebender/seven-deadly-sins
  - name: Code Review Focus
    rule: |
      Act as a meticulous code reviewer. Enforce the rules above. Provide concise, actionable diffs when proposing changes. Verify Envoy comments and import realm/order. Flag missing or misplaced comments and comment marker misuse.
