name: DeepSeek — Test Reviewer
version: 1.0.0
schema: v1

models:
  - name: DeepSeek Coder 33B (Ollama)
    provider: ollama
    model: deepseek-coder:33b
    apiBase: http://localhost:11434
    roles:
      - chat
      - edit
      - apply
    defaultCompletionOptions:
      temperature: 0.2

context:
  - provider: code
  - provider: diff

rules:
  - uses: sitebender/assistant-compliance
  - uses: sitebender/testing
  - name: "Guardrails: Tests Only"
    rule: |
      Task: Improve correctness and coverage of tests for the target lifted function.
      Allowed:
      - Edit test files only (index.test.ts in the target folder).
      - Add missing cases; maintain determinism.
      Forbidden:
      - Editing production code.
      - Introducing external dependencies.
