name: DeepSeek — Planning
version: 1.0.0
schema: v1

models:
  - name: DeepSeek Coder 33B (Ollama)
    provider: ollama
    model: deepseek-coder:33b
    apiBase: http://localhost:11434
    roles:
      - chat
    defaultCompletionOptions:
      temperature: 0.3

context:
  - provider: code
  - provider: folder
    params:
      path: ./rules
      include:
        - "**/*.md"
        - "**/*.json"
      maxBytes: 100000
  - provider: diff

rules:
  - uses: sitebender/core-philosophy
  - uses: sitebender/code-style
  - uses: sitebender/imports
  - uses: sitebender/toolkit-fp
  - uses: sitebender/envoy-style
  - uses: sitebender/architecture
  - name: Project Planning
    rule: |
      Produce step-by-step implementation plans with:
      - a minimal, verifiable todo list for VS Code
      - explicit file paths, function signatures, and acceptance criteria
      - risks/assumptions and small rollback steps
      Respect the toolkit-first FP approach and one-function-per-file layout. Write tests first for new files and before editing existing files.
