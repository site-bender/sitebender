name: "Claude — Scripts Refactor Step 2: Extract Constants & Types"
version: 1.0.0
schema: v1

models:
  - name: Claude Opus 4.1 (Anthropic)
    provider: anthropic
    model: claude-opus-4.1
    roles:
      - chat
      - edit
      - apply
    defaultCompletionOptions:
      temperature: 0.1

context:
  - provider: code
  - provider: diff

rules:
  - uses: sitebender/stable-header
  - uses: sitebender/guardrails
  - uses: sitebender/assistant-compliance
  - uses: sitebender/imports
  - uses: sitebender/code-style
  - name: "Guardrails: Extract constants/types to files"
    rule: |
      Goal: For each script module, move constants and types into `constants/index.ts` and `types/index.ts`.
      - Export constants and types as named exports.
      - Update local imports accordingly; preserve order/grouping rules.
      - Do not change behavior or test files in this step.
