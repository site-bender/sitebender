name: DeepSeek — Strategizing
version: 1.0.0
schema: v1

models:
  - name: DeepSeek Coder 33B (Ollama)
    provider: ollama
    model: deepseek-coder:33b
    apiBase: http://localhost:11434
    roles:
      - chat
    defaultCompletionOptions:
      temperature: 0.4

context:
  - provider: code
  - provider: docs
  - provider: folder
    params:
      path: ./rules
      include:
        - "**/*.md"
        - "**/*.json"
      maxBytes: 100000

rules:
  - uses: sitebender/core-philosophy
  - uses: sitebender/code-style
  - uses: sitebender/imports
  - uses: sitebender/toolkit-fp
  - uses: sitebender/envoy-style
  - uses: sitebender/architecture
  - uses: sitebender/error-handling
  - uses: sitebender/data-privacy
  - name: Architecture Strategy
    rule: |
      Provide trade-off analyses and propose patterns that preserve FP purity, modularity, and type-safety using the toolkit (no external libs). Consider performance, DX, testability, and Envoy doc impact. Output succinct recommendations with pros/cons and a clear decision.
