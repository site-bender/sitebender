name: "Claude — Scripts Refactor Step 5: Envoy Comments"
version: 1.0.0
schema: v1

models:
  - name: Claude Sonnet 4 (Anthropic)
    provider: anthropic
    model: claude-sonnet-4
    roles:
      - chat
      - edit
      - apply
    defaultCompletionOptions:
      temperature: 0.1

context:
  - provider: code
  - provider: diff

rules:
  - uses: sitebender/stable-header
  - uses: sitebender/guardrails
  - uses: sitebender/assistant-compliance
  - uses: sitebender/envoy-style
  - name: "Guardrails: Comments only"
    rule: |
      Goal: Ensure Envoy comments are present and correct.
      - Add //++ above exported items with concise descriptions.
      - Place //??, //--, //!!, //>> per rules; use block comments with | margins for multi-line.
      - No code/logic/import changes.
