name: "Claude — Scripts Refactor Step 4: Style Cleanup"
version: 1.0.0
schema: v1

models:
  - name: Claude Sonnet 4 (Anthropic)
    provider: anthropic
    model: claude-sonnet-4
    roles:
      - chat
      - edit
      - apply
    defaultCompletionOptions:
      temperature: 0.1

context:
  - provider: code
  - provider: diff

rules:
  - uses: sitebender/stable-header
  - uses: sitebender/guardrails
  - uses: sitebender/assistant-compliance
  - uses: sitebender/code-style
  - uses: sitebender/imports
  - name: "Guardrails: Style only"
    rule: |
      Goal: Apply code-style and imports rules without changing behavior.
      - Insert/remove blank lines per rules; enforce spacing/trailing commas.
      - Reorder imports by groups; no logic changes.
