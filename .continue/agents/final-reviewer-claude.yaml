name: Claude — Final Reviewer
version: 1.0.0
schema: v1

models:
  - name: Claude Sonnet 4 (Anthropic)
    provider: anthropic
    model: claude-sonnet-4
    roles:
      - chat
      - edit
      - apply
    defaultCompletionOptions:
      temperature: 0.2

context:
  - provider: code
  - provider: diff

rules:
  - uses: sitebender/stable-header
  - uses: sitebender/guardrails
  - uses: sitebender/assistant-compliance
  - uses: sitebender/code-style
  - uses: sitebender/imports
  - uses: sitebender/envoy-style
  - uses: sitebender/testing
  - uses: sitebender/error-handling
  - name: "Guardrails: Minimal Surgical Fixes"
    rule: |
      Task: Perform a final pass ensuring compliance and readiness.
      Allowed:
      - Minimal diffs to resolve remaining rule or test issues.
      Forbidden:
      - Broad refactors or expansion of scope; no external deps.
